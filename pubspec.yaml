name: codeshield
description: "Project for ITE 010 A."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
    sdk: ^3.11.0

dependencies:
    flutter:
        sdk: flutter
    cupertino_icons: ^1.0.8
    flame: ^1.36.0
    carousel_slider: ^5.1.2
    video_player: ^2.11.1
    faker: ^2.2.0
    hive_flutter: ^1.1.0
    hive: ^2.2.3
    flame_audio: ^2.12.1

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_launcher_icons: ^0.13.1 # Add this line
    flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png" # Path to your high-res logo
  adaptive_icon_background: "#000000" # Cyberpunk black background
  adaptive_icon_foreground: "assets/images/app_logo.png"
flutter:
    uses-material-design: true
    assets:
        - assets/
        - assets/images/
        - assets/images/icons/
        - assets/images/profiles/
        - assets/fonts/
        - assets/audio/
        - assets/images/pausebutton.png
        - assets/images/virus_green.png
        - assets/images/virus_red.png
        - assets/videos/movement_gameplay.mp4
        - assets/videos/objective.mp4
        - assets/videos/weapon_type.mp4
        - assets/videos/wavelogic.mp4
        - assets/videos/powerups.mp4
        - assets/videos/upgrade.mp4
        - assets/images/trojandescription.png
        - assets/images/phising template.png
        - assets/images/virus template.png
        - assets/images/botnet template.png
        - assets/images/sqlinjection template.png
        - assets/images/scanner template.png
        - assets/images/ransomware template.png
        - assets/images/app_logo.png
    fonts:
        - family: PixelifySans
          fonts:
              - asset: assets/fonts/PixelifySans-VariableFont_wght.ttf
